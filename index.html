<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Online | Rápido e Fácil</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Biblioteca de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎲 Sorteador Online</h1>
            <p>Rápido, fácil e divertido! Faça seus sorteios na hora.</p>
        </header>

        <!-- Menu de Navegação -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="numeros">Números</button>
            <button class="tab-btn" data-tab="nomes">Nomes</button>
            <button class="tab-btn" data-tab="roleta">Roleta</button>
            <button class="tab-btn" data-tab="moeda">Cara ou Coroa</button>
        </div>

        <!-- Área de Conteúdo -->
        <div class="content">
            
            <!-- Aba 1: Números -->
            <div class="tab-content active" id="numeros">
                <h2>Sorteio de Números</h2>
                <div class="input-group">
                    <div>
                        <label>Do número</label>
                        <input type="number" id="numMin" value="1" min="1">
                    </div>
                    <div>
                        <label>Até o número</label>
                        <input type="number" id="numMax" value="100" min="1">
                    </div>
                </div>
                <button class="btn-sortear" onclick="sortearNumero()">Sortear Número</button>
                <div class="resultado" id="resultadoNum">?</div>
            </div>

            <!-- Aba 2: Nomes -->
            <div class="tab-content" id="nomes">
                <h2>Sorteio de Nomes</h2>
                <label>📋 Lista de Nomes (um por linha):</label>
                <textarea id="listaNomes" placeholder="Digite aqui...&#10;João&#10;Maria&#10;Pedro&#10;Ana" rows="8"></textarea>
                <button class="btn-sortear" onclick="sortearNome()">Sortear Nome</button>
                <div class="resultado" id="resultadoNome">?</div>
            </div>

            <!-- Aba 3: Roleta -->
            <div class="tab-content" id="roleta">
                <h2>Roleta da Sorte</h2>
                
                <div class="input-roleta">
                    <label>⚙️ Opções da Roleta (uma por linha):</label>
                    <textarea id="opcoesRoleta" placeholder="Exemplo:&#10;Ganhou um Prêmio!&#10;Pergunta Difícil&#10;Passar a vez&#10;Prêmio Top" rows="4">Prêmio 1&#10;Prêmio 2&#10;Prêmio 3&#10;Prêmio 4&#10;Prêmio 5&#10;Prêmio 6</textarea>
                    <button class="btn-atualizar" onclick="atualizarRoleta()">✅ Atualizar Roleta</button>
                </div>

                <div class="roleta-container">
                    <canvas id="roleta"></canvas>
                    <div class="marcador"></div>
                </div>
                <button class="btn-sortear" onclick="girarRoleta()">Girar Roleta</button>
                <div class="resultado" id="resultadoRoleta">Clique para girar</div>
            </div>

            <!-- Aba 4: Cara ou Coroa -->
            <div class="tab-content" id="moeda">
                <h2>Cara ou Coroa</h2>
                
                <div class="input-moeda">
                    <label>🎨 Personalizar Lados (opcional):</label>
                    <div class="input-duplo">
                        <div>
                            <label>Texto Cara</label>
                            <input type="text" id="textoCara" value="CARA">
                        </div>
                        <div>
                            <label>Texto Coroa</label>
                            <input type="text" id="textoCoroa" value="COROA">
                        </div>
                    </div>
                </div>

                <div class="moeda-container">
                    <div class="moeda" id="moeda">
                        <div class="lado cara" id="ladoCara">🦁</div>
                        <div class="lado coroa" id="ladoCoroa">👑</div>
                    </div>
                </div>
                <button class="btn-sortear" onclick="jogarMoeda()">Jogar Moeda</button>
                <div class="resultado" id="resultadoMoeda">?</div>
            </div>

        </div>

        <!-- RODAPÉ -->
        <footer class="footer">
            <p>Desenvolvido por <a href="https://t.me/redkz" target="_blank">@redkz</a></p>
        </footer>
    </div>

    <!-- Som de Festa -->
    <audio id="somFesta" src="https://assets.mixkit.co/sfx/preview/mixkit-fairytale-winner-announcement-613.mp3" preload="auto">

    <script src="script.js"></script>
</body>
</html>
