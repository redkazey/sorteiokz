<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Online | Rápido e Fácil</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🎲 Sorteador Online</h1>
            <p>Rápido, fácil e grátis. Faça seus sorteios na hora!</p>
        </header>

        <!-- Menu de Navegação -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="numeros">Números</button>
            <button class="tab-btn" data-tab="nomes">Nomes</button>
            <button class="tab-btn" data-tab="roleta">Roleta</button>
            <button class="tab-btn" data-tab="moeda">Cara ou Coroa</button>
        </div>

        <!-- Área de Conteúdo -->
        <div class="content">
            
            <!-- Aba 1: Números -->
            <div class="tab-content active" id="numeros">
                <h2>Sorteio de Números</h2>
                <div class="input-group">
                    <div>
                        <label>Do número</label>
                        <input type="number" id="numMin" value="1" min="1">
                    </div>
                    <div>
                        <label>Até o número</label>
                        <input type="number" id="numMax" value="100" min="1">
                    </div>
                </div>
                <button class="btn-sortear" onclick="sortearNumero()">Sortear Número</button>
                <div class="resultado" id="resultadoNum">?</div>
            </div>

            <!-- Aba 2: Nomes -->
            <div class="tab-content" id="nomes">
                <h2>Sorteio de Nomes</h2>
                <label>Digite um nome por linha:</label>
                <textarea id="listaNomes" placeholder="Ex:&#10;Maria&#10;João&#10;Pedro" rows="8"></textarea>
                <button class="btn-sortear" onclick="sortearNome()">Sortear Nome</button>
                <div class="resultado" id="resultadoNome">?</div>
            </div>

            <!-- Aba 3: Roleta -->
            <div class="tab-content" id="roleta">
                <h2>Roleta da Sorte</h2>
                <div class="roleta-container">
                    <canvas id="roleta"></canvas>
                    <div class="marcador"></div>
                </div>
                <button class="btn-sortear" onclick="girarRoleta()">Girar Roleta</button>
                <div class="resultado" id="resultadoRoleta">Clique para girar</div>
            </div>

            <!-- Aba 4: Cara ou Coroa -->
            <div class="tab-content" id="moeda">
                <h2>Cara ou Coroa</h2>
                <div class="moeda-container">
                    <div class="moeda" id="moeda">
                        <div class="lado cara">🦁</div>
                        <div class="lado coroa">👑</div>
                    </div>
                </div>
                <button class="btn-sortear" onclick="jogarMoeda()">Jogar Moeda</button>
                <div class="resultado" id="resultadoMoeda">?</div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
